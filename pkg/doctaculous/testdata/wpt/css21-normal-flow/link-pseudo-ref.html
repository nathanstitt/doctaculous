<!DOCTYPE html>
<!-- REFERENCE for link-pseudo.html. The same text in a <span> with the link's color
     and underline applied directly, instead of via the a:link pseudo-class. <a> and
     <span> are both inline-level, so with identical color + text-decoration + font the
     glyph runs and the underline rule are pixel-identical. -->
<html>
<head>
<style>
  body { margin: 0; font-family: sans-serif; font-size: 16px; }
  span { color: #cc0000; text-decoration: underline; }
</style>
</head>
<body><span>linked</span></body>
</html>
