<!DOCTYPE html><html><head><style>
  body { margin: 0; position: relative; height: 100px; }
  .box { position: absolute; }
</style></head><body>
  <div class="box" style="left: 0;    top: 0;   width: 200px; height: 40px; background: #553399;"></div>
  <div class="box" style="left: 0;    top: 40px; width: 100px; height: 60px; background: #cc3333;"></div>
  <div class="box" style="left: 100px; top: 40px; width: 100px; height: 60px; background: #3366cc;"></div>
</body></html>
