<!DOCTYPE html>
<!-- REFERENCE for percent-width.html. The child width is written as the resolved
     absolute length (50% of 400px = 200px). Identical pixels to the percentage. -->
<html>
<head>
<style>
  body { margin: 0; }
  #parent { width: 400px; background: #eeeeee; }
  #child  { width: 200px; height: 60px; background: #cc3366; }
</style>
</head>
<body>
  <div id="parent">
    <div id="child"></div>
  </div>
</body>
</html>
