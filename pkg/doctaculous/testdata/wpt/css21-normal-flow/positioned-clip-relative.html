<!DOCTYPE html><html><head><style>
  body { margin: 0; }
  /* A POSITIONED (position:relative) overflow:hidden clip box: it is a stacking context
     that consumes the relative child AND clips it to its padding box (sub-case B). */
  .clip { position: relative; overflow: hidden; width: 80px; height: 80px; background: #dddddd; }
  .child { position: relative; left: 30px; top: 30px; width: 60px; height: 60px; background: #cc3333; }
</style></head><body>
  <div class="clip">
    <div class="child"></div>
  </div>
</body></html>
