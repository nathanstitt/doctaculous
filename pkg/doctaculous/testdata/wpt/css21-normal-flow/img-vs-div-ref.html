<!DOCTYPE html>
<!-- REFERENCE for img-vs-div.html. The same 100x60 box drawn as a <div> with the
     swatch color as its background instead of as a stretched <img>. With no padding
     or border, the div's 100x60 background fill is pixel-identical to the replaced
     image's object-fit:fill of a solid swatch of the same color. -->
<html>
<head>
<style>
  body { margin: 0; }
  #box { width: 100px; height: 60px; background: #3366cc; }
</style>
</head>
<body>
  <div id="box"></div>
</body>
</html>
