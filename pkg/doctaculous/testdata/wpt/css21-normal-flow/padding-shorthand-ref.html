<!DOCTYPE html>
<!-- REFERENCE for padding-shorthand.html. The same padding written in the explicit
     four-value form: top=10 right=20 bottom=10 left=20. Identical pixels. -->
<html>
<head>
<style>
  body { margin: 0; }
  #parent { width: 260px; padding: 10px 20px 10px 20px; background: #ddddaa; }
  #child  { height: 40px; background: #336699; }
</style>
</head>
<body>
  <div id="parent">
    <div id="child"></div>
  </div>
</body>
</html>
