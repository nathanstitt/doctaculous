<!DOCTYPE html>
<!-- REFERENCE for auto-width.html. The same div with width set explicitly to the
     viewport width (200px; matched by the test's WithViewportWidth). No padding or
     border, so the 200px content width is also the 200px border box — identical to
     the auto width that fills the 200px viewport. -->
<html>
<head>
<style>
  body { margin: 0; }
  #box { width: 200px; height: 60px; background: #9933cc; }
</style>
</head>
<body>
  <div id="box"></div>
</body>
</html>
