<!DOCTYPE html>
<!-- REFERENCE for bg-image-vs-color.html. The same 100x60 box filled with the swatch
     color as a background-color instead of a tiled solid background-image. With no
     padding or border, the color fill is pixel-identical to tiling a solid swatch of
     the same color across the box. -->
<html>
<head>
<style>
  body { margin: 0; }
  #box { width: 100px; height: 60px; background: #3366cc; }
</style>
</head>
<body>
  <div id="box"></div>
</body>
</html>
