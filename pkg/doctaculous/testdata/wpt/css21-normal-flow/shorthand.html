<!DOCTYPE html>
<!-- TEST: the margin / border / padding shorthands expand to the same used values
     as their longhand equivalents (CSS 2.1 shorthand expansion). -->
<html>
<head>
<style>
  body { margin: 0; }
  #box {
    margin: 10px 20px;
    border: 2px solid black;
    padding: 5px;
    width: 120px;
    height: 30px;
    background: #66cc66;
  }
</style>
</head>
<body>
  <div id="box"></div>
</body>
</html>
