<!DOCTYPE html><html><head><style>
  body { margin: 0; }
  .grid { display: grid; grid-template-columns: 80px 80px 80px; grid-template-rows: 60px; }
  .span2 { grid-column: 1 / span 2; background: #cc3333; }
  .single { background: #3366cc; }
</style></head><body>
  <div class="grid">
    <div class="span2"></div>
    <div class="single"></div>
  </div>
</body></html>
