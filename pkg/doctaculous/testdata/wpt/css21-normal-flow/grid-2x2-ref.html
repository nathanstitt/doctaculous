<!DOCTYPE html><html><head><style>
  body { margin: 0; position: relative; height: 120px; }
  .box { position: absolute; }
  .a { background: #cc3333; }
  .b { background: #3366cc; }
  .c { background: #33aa33; }
  .d { background: #cc8800; }
</style></head><body>
  <div class="box a" style="left: 0;   top: 0;  width: 100px; height: 60px;"></div>
  <div class="box b" style="left: 100px; top: 0;  width: 100px; height: 60px;"></div>
  <div class="box c" style="left: 0;   top: 60px; width: 100px; height: 60px;"></div>
  <div class="box d" style="left: 100px; top: 60px; width: 100px; height: 60px;"></div>
</body></html>
