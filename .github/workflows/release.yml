name: Release

# Publishing a GitHub Release from a pushed version tag. goreleaser cross-compiles
# the doctaculous CLI for every target (see .goreleaser.yaml) and uploads the
# archives + checksums. The workflow must already exist on the default branch for
# a tag push to trigger it, so this lands (and merges) before the first tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser's changelog needs the full history and all tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
